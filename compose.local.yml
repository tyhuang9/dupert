services:
  postgres:
    image: postgres:${DUPERT_POSTGRES_MAJOR:-16}-alpine
    environment:
      POSTGRES_DB: dupert
      POSTGRES_USER: dupert
      # Local-only development credentials. Never use these outside this Compose service.
      POSTGRES_PASSWORD: dupert_local_dev_password
    ports:
      - "127.0.0.1:${DUPERT_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres_data:
    name: dupert_local_postgres_data

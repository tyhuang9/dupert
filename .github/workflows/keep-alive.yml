name: Keep Backend Awake

# Pings the backend liveness endpoint so hosts with idle timeouts keep the service warm
# without querying Neon or external providers. Configure the KEEP_ALIVE_URL repository
# secret with the full liveness URL, for example:
# https://my-backend.onrender.com/actuator/health/liveness
on:
  schedule:
    # Every 10 minutes matches the documented external keep-warm contract.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend liveness endpoint
        env:
          KEEP_ALIVE_URL: ${{ secrets.KEEP_ALIVE_URL }}
        run: |
          curl --fail --show-error --silent --location "$KEEP_ALIVE_URL" >/dev/null
          echo "Backend liveness endpoint responded successfully."

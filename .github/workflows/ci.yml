name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Restore dependency-check data
        id: dependency-check-cache
        uses: actions/cache@v5
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-scan-${{ runner.os }}-${{ hashFiles('backend/build.gradle', 'backend/gradle/wrapper/gradle-wrapper.properties') }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-${{ runner.os }}-${{ hashFiles('backend/build.gradle', 'backend/gradle/wrapper/gradle-wrapper.properties') }}-

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test

      - name: Verify dependency-check cache
        shell: bash
        run: |
          if [ ! -d "$HOME/.gradle/dependency-check-data" ] || ! find "$HOME/.gradle/dependency-check-data" -name '*.mv.db' -print -quit | grep -q .; then
            echo "::error title=Dependency-Check cache missing::Run the Dependency-Check Data workflow manually, or wait for the scheduled cache refresh, before running CI."
            exit 1
          fi

      - name: Run dependency check
        working-directory: backend
        env:
          DEPENDENCY_CHECK_AUTO_UPDATE: 'false'
        run: ./gradlew dependencyCheckAnalyze

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: backend-dependency-check
          path: |
            backend/build/reports/dependency-check-report.html
            backend/build/reports/dependency-check-report.json
          if-no-files-found: ignore

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Audit production dependencies
        working-directory: frontend
        run: npm audit --omit=dev

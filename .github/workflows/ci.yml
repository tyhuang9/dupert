name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Restore dependency-check data
        id: dependency-check-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-${{ runner.os }}-odc-data-v1-${{ github.run_id }}
          restore-keys: |
            dependency-check-${{ runner.os }}-odc-data-v1-

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test

      - name: Check dependency-check data
        id: dependency-check-data
        shell: bash
        run: |
          if [ -d "$HOME/.gradle/dependency-check-data" ] && find "$HOME/.gradle/dependency-check-data" -name '*.mv.db' -print -quit | grep -q .; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning title=Dependency-Check skipped::No cached Dependency-Check database was found. Run the Dependency-Check Data workflow manually, or wait for the scheduled cache refresh, to enable this scan in CI."
          echo "available=false" >> "$GITHUB_OUTPUT"

      - name: Run dependency check
        if: steps.dependency-check-data.outputs.available == 'true'
        working-directory: backend
        env:
          DEPENDENCY_CHECK_AUTO_UPDATE: 'false'
        run: ./gradlew dependencyCheckAnalyze

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: backend-dependency-check
          path: |
            backend/build/reports/dependency-check-report.html
            backend/build/reports/dependency-check-report.json
          if-no-files-found: ignore

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: web-development
            command: build:web:development
          - profile: web-staging
            command: build:web:staging
          - profile: web-production
            command: build:web:production
          - profile: native-development
            command: build:native:development
          - profile: native-staging
            command: build:native:staging
          - profile: native-production
            command: build:native:production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test

      - name: Build ${{ matrix.profile }}
        working-directory: frontend
        env:
          # Safe build-only values. Production native builds also prove that
          # browser Maps and app-wall configuration stay absent.
          VITE_BACKEND_API_URL: https://api.dupert.test
          VITE_GOOGLE_MAPS_API_KEY: ''
          VITE_APP_ACCESS_PASSWORD: ''
        run: npm run ${{ matrix.command }}

      - name: Enforce bundle budgets
        working-directory: frontend
        env:
          BUNDLE_BUDGET_ENFORCE: 'true'
        run: npm run check:bundle-budget

      - name: Audit production dependencies
        working-directory: frontend
        run: npm audit --omit=dev

  native-sync:
    name: Native Capacitor sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Check mobile release-readiness preflight
        working-directory: frontend
        run: npm run check:mobile-release-readiness

      - name: Build and sync native staging bundle
        working-directory: frontend
        env:
          # Non-secret CI-only endpoint. Production builds in a real profile
          # still fail clearly if VITE_BACKEND_API_URL is absent or unsafe.
          VITE_BACKEND_API_URL: https://api.dupert.test
          VITE_GOOGLE_MAPS_API_KEY: ''
          VITE_APP_ACCESS_PASSWORD: ''
        run: npm run sync:native:staging

      - name: Verify generated project inputs remain deterministic
        working-directory: frontend
        run: |
          test -f ios/App/App/capacitor.config.json
          test -f android/app/src/main/assets/capacitor.config.json
          git diff --exit-code -- ios android capacitor.config.ts

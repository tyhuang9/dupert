plugins {
	id 'java'
	id 'org.springframework.boot' version '3.5.15'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'org.owasp.dependencycheck' version '12.2.2'
}

group = 'com.trip'
version = '0.0.1-SNAPSHOT'
description = 'Dupert backend'

// Dependency-Check matches Log4j API/SLF4J bridge artifacts to generic Log4j
// CPEs. Keep the managed Log4j 2.x line on the release that fixes the flagged
// Core/1.x-bridge CVEs until the Spring Boot BOM catches up.
ext['log4j2.version'] = '2.25.4'
// Keep all Jackson modules on patched BOM 2.22.1; it fixes CVE-2026-54515.
ext['jackson-bom.version'] = '2.22.1'
ext['tomcat.version'] = '10.1.56'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-actuator'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.flywaydb:flyway-core'
	implementation 'org.flywaydb:flyway-database-postgresql'

	// JWT (JJWT)
	implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

	// Rate limiting
	implementation 'com.bucket4j:bucket4j-core:8.10.1'

	// PostgreSQL JDBC 42.7.12 fixes CVE-2026-54291.
	runtimeOnly 'org.postgresql:postgresql:42.7.12'

	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.security:spring-security-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}

// OWASP Dependency-Check configuration.
// Run via: ./gradlew dependencyCheckAnalyze.
def nvdApiKey = System.getenv('NVD_API_KEY')
def dependencyCheckAutoUpdate = System.getenv('DEPENDENCY_CHECK_AUTO_UPDATE') != 'false'
dependencyCheck {
	autoUpdate = dependencyCheckAutoUpdate
	formats = ['HTML', 'JSON']
	failBuildOnCVSS = 7.0
	suppressionFile = 'config/dependency-check-suppressions.xml'
	nvd {
		delay = 6000
		maxRetryCount = 12
		if (nvdApiKey != null && !nvdApiKey.isBlank()) {
			apiKey = nvdApiKey
		}
	}
	analyzers {
		// Skip slow/unused analyzers for a leaner scan.
		assemblyEnabled = false
		nuspecEnabled = false
		nugetconfEnabled = false
	}
}

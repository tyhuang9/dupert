spring:
  application:
    name: dupert-backend
  profiles:
    default: local
  datasource:
    # DATABASE_URL is expected in the format postgresql://USER:PASSWORD@HOST/DB?... (as Neon provides).
    # Spring/JDBC wants `jdbc:postgresql://...` with user/password pulled into separate props; the
    # easiest way is to let the user paste the raw Neon URL and we transform it here.
    url: ${DATABASE_URL:}
    driver-class-name: org.postgresql.Driver
    hikari:
      # One free-tier Render instance should leave connection headroom for Neon
      # maintenance and local tooling. Hikari is provided by Spring Boot's JPA
      # starter; these values make its production budget explicit.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:4}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:3000}
      idle-timeout: 300000
      keepalive-time: 0
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  jackson:
    deserialization:
      fail-on-unknown-properties: true
    default-property-inclusion: non_null
    mapper:
      default-view-inclusion: false
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8000
  compression:
    enabled: true
    min-response-size: 2KB
    # Keep SSE out of this allowlist: buffered/compressed event streams delay
    # realtime delivery and defeat the purpose of a long-lived connection.
    mime-types: application/json,application/javascript,text/css,text/html,text/javascript,text/plain,text/xml,application/xml,application/xhtml+xml
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
    include-exception: false
  tomcat:
    max-http-form-post-size: 1MB

# App-specific configuration.
app:
  # CORS allowlist. Comma-separated list of exact origins. Required.
  frontend-origin: ${ALLOWED_ORIGINS:}
  # Public browser origin used when composing email links.
  public-frontend-url: ${APP_PUBLIC_FRONTEND_URL:}
  # JWT HS256 secret. Required — must be >= 32 bytes after decode. No default in prod.
  jwt-secret: ${JWT_SECRET:}
  # Hex pepper used to SHA-256-hash emails before they end up in logs.
  log-email-pepper: ${LOG_EMAIL_PEPPER:}
  # Cookie attributes. `secure` is overridden to true in prod profiles. Leave false here
  # so dev browsers (http://localhost) actually receive the cookie.
  cookies:
    secure: false
    same-site: ${APP_COOKIES_SAME_SITE:Strict}
  signup-enabled: ${SIGNUP_ENABLED:true}
  email:
    brevo-api-key: ${BREVO_API_KEY:}
    from-email: ${APP_EMAIL_FROM_EMAIL:}
    from-name: ${APP_EMAIL_FROM_NAME:Dupert}
  # Backend-local Google Maps API key for Places, Geocoding, and Routes requests.
  google-maps-server-api-key: ${GOOGLE_MAPS_API_KEY:}
  place-details:
    basic-ttl: ${PLACE_DETAILS_BASIC_TTL:7d}
    expanded-ttl: ${PLACE_DETAILS_EXPANDED_TTL:1d}
  google-maps-cache:
    search-ttl: ${GOOGLE_MAPS_SEARCH_TTL:15m}
    geocode-ttl: ${GOOGLE_MAPS_GEOCODE_TTL:30d}
    route-ttl: ${GOOGLE_MAPS_ROUTE_TTL:1h}
    photo-ttl: ${GOOGLE_MAPS_PHOTO_TTL:1d}
  # Honor X-Forwarded-For for client-IP resolution. Default false; flip to true only
  # behind a proxy that overwrites (not appends) the header (Fly, Vercel).
  trust-proxy: ${APP_TRUST_PROXY:false}

# Security knobs (toggled on in prod, off in dev).
secure:
  hsts:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      group:
        # A keep-warm probe must answer whether this JVM is alive without waking
        # Neon or coupling liveness to Google/Brevo availability. Keep the group
        # explicit so future HealthIndicator beans are not added accidentally.
        liveness:
          include: livenessState
      show-details: never
  health:
    defaults:
      enabled: true

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.trip: INFO

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3f5f53" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Dupert" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Dupert</title>
    <script>
      (() => {
        try {
          const key = 'dupert.colorMode'
          const stored = window.localStorage.getItem(key)
          const mode = stored === 'dark' || stored === 'system' ? stored : 'light'
          const resolved = mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : mode === 'dark'
              ? 'dark'
              : 'light'
          document.documentElement.dataset.theme = resolved
          document.documentElement.dataset.colorMode = mode
          document.documentElement.style.colorScheme = resolved
        } catch {
          document.documentElement.dataset.theme = 'light'
          document.documentElement.dataset.colorMode = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

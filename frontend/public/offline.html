<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3f5f53" />
    <title>Dupert is offline</title>
    <style>
      :root { color-scheme: light dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      body { min-height: 100dvh; box-sizing: border-box; margin: 0; padding: max(1.5rem, env(safe-area-inset-top)) max(1.5rem, env(safe-area-inset-right)) max(1.5rem, env(safe-area-inset-bottom)) max(1.5rem, env(safe-area-inset-left)); display: grid; place-items: center; background: #f6f5f2; color: #242628; }
      main { width: min(32rem, calc(100vw - 3rem)); padding: 2rem; background: #fff; border: 1px solid #e7e3dc; border-radius: 1rem; box-shadow: 0 18px 52px rgba(36, 38, 40, .12); }
      h1 { margin: 0 0 .75rem; font-size: clamp(1.75rem, 6vw, 2.5rem); }
      p { margin: 0 0 1.5rem; color: #5f656a; line-height: 1.55; }
      button { min-height: 44px; padding: 0 1rem; color: #f1f2ef; background: #3f5f53; border: 0; border-radius: .625rem; font: inherit; font-weight: 700; cursor: pointer; }
      @media (prefers-color-scheme: dark) {
        body { background: #181f21; color: #f1f2ef; }
        main { background: #2a3134; border-color: #4a5558; }
        p { color: #c5c9c6; }
        button { color: #242628; background: #7dba9e; }
      }
    </style>
  </head>
  <body>
    <main data-dupert-offline-shell>
      <h1>You’re offline</h1>
      <p>Reconnect to load your trips and collaboration updates. Dupert does not store private trip data for offline use.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
